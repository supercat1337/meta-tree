<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Meta‑Tree DSL Playground</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }
            .row {
                min-height: 0;
            }
            .col-6 {
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            .textarea-wrapper,
            .output-wrapper {
                flex: 1 1 auto;
                min-height: 0;
                display: flex;
                flex-direction: column;
            }
            textarea,
            pre {
                flex: 1 1 auto;
                overflow: auto;
                margin-bottom: 0;
            }
            pre {
                background: #f8f9fa;
                padding: 1rem;
                border-radius: 0.375rem;
            }
            .error {
                color: #dc3545;
                font-size: 0.875rem;
                margin-top: 0.25rem;
            }
        </style>
    </head>

    <body>
        <div class="container py-3">
            <!-- Строка кнопок над колонками -->
            <div class="mt-2">
                <button type="button" id="parse-button" class="btn btn-primary">
                    Parse → JSON
                </button>
                <button type="button" id="parse-macros-button" class="btn btn-info">
                    Parse with Macros
                </button>
                <button type="button" id="beautify-button" class="btn btn-secondary">
                    Beautify DSL
                </button>
                <button type="button" id="load-example" class="btn btn-outline-info">
                    Load Example
                </button>
                <button type="button" id="load-macro-example" class="btn btn-outline-warning">
                    Load Macro Example
                </button>
                <button type="button" id="beautify-macros-button" class="btn btn-secondary">
                    Beautify DSL (macros)
                </button>
            </div>

            <!-- Строка с ошибкой -->
            <div id="error" class="error"></div>

            <!-- Основные колонки -->
            <div class="row h-75">
                <div class="col-6">
                    <label class="form-label fw-bold">DSL Input</label>
                    <div class="textarea-wrapper">
                        <textarea
                            id="tree-string"
                            class="form-control font-monospace"
                            placeholder='user.profile.update&#10;    username    maxLength="32" // Display name&#10;    @returns&#10;        result    boolean'
                        ></textarea>
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold">Output (JSON)</label>
                    <div class="output-wrapper">
                        <pre
                            id="output"
                            class="bg-light p-3 border rounded"
                        ><code>// Click Parse to see the tree structure</code></pre>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="./main.js"></script>
    </body>
</html>
