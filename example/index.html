<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Meta‑Tree DSL Playground</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }
            .error {
                color: #dc3545;
                margin-top: 0.5rem;
            }
            pre {
                background: #f8f9fa;
                padding: 1rem;
                border-radius: 0.375rem;
            }
        </style>
    </head>

    <body>
        <div class="container h-100 py-3">
            <div class="row h-100">
                <div class="col-6 d-flex flex-column">
                    <label class="form-label fw-bold">DSL Input</label>
                    <textarea
                        id="tree-string"
                        class="form-control flex-grow-1 font-monospace"
                        rows="3"
                        placeholder='user.profile.update&#10;    username    maxLength="32" // Display name&#10;    @returns&#10;        result    boolean'
                    ></textarea>
                    <div id="error" class="error small"></div>
                    <div class="mt-2">
                        <button type="button" id="parse-button" class="btn btn-primary">
                            Parse → JSON
                        </button>
                        <button type="button" id="beautify-button" class="btn btn-secondary">
                            Beautify DSL
                        </button>
                        <button type="button" id="load-example" class="btn btn-outline-info">
                            Load Example
                        </button>
                    </div>
                </div>
                <div class="col-6 d-flex flex-column">
                    <label class="form-label fw-bold">Output (JSON)</label>
                    <pre
                        id="output"
                        class="flex-grow-1 overflow-auto bg-light p-3 border rounded"
                    ><code>// Click Parse to see the tree structure</code></pre>
                    <div class="mt-2">
                        <button
                            type="button"
                            id="copy-output"
                            class="btn btn-outline-secondary btn-sm"
                        >
                            Copy JSON
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="./main.js"></script>
    </body>
</html>
